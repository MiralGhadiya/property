version: "3.9"

services:

  api:
    build: .
    container_name: valuation_api
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: sh /app/start.sh

  redis:
    image: redis:7
    container_name: valuation_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: valuation_worker
    command: celery -A app.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  celery_beat:
    build: .
    container_name: valuation_beat
    command: celery -A app.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: valuation_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api


